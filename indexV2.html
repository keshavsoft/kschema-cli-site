<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>kschema CLI</title>

    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        h1 {
            color: #58a6ff;
            font-size: 40px;
            margin-bottom: 5px;
        }

        .tagline {
            color: #8b949e;
            margin-bottom: 40px;
        }

        h2 {
            margin-top: 40px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .card {
            background: #161b22;
            padding: 16px;
            border-radius: 8px;
            margin-top: 10px;
            position: relative;
        }

        code {
            color: #79c0ff;
            font-size: 14px;
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: #21262d;
            border: none;
            color: #c9d1d9;
            padding: 5px 8px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 12px;
        }

        .copy-btn:hover {
            background: #30363d;
        }

        .links a {
            display: inline-block;
            margin-right: 15px;
            color: #58a6ff;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 60px;
            color: #8b949e;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>kschema CLI</h1>
        <div class="tagline">Generate projects instantly. No setup. No confusion.</div>

        <h2>Install</h2>
        <div class="card">
            <button class="copy-btn" onclick="copy(this)">Copy</button>
            <code>npm i -g @keshavsoft/kschema-cli</code>
        </div>

        <h2>Usage</h2>
        <div class="card">
            <button class="copy-btn" onclick="copy(this)">Copy</button>
            <code>kschema init basic MyApp</code>
        </div>

        <div class="card">
            <button class="copy-btn" onclick="copy(this)">Copy</button>
            <code>kschema init express MyServer</code>
        </div>

        <h2>Quick Start</h2>
        <div class="card">
            <button class="copy-btn" onclick="copy(this)">Copy</button>
            <code>npx @keshavsoft/kschema-cli init express MyApp</code>
        </div>

        <h2>Links</h2>
        <div class="links">
            <a href="https://github.com/keshavsoft/kschema-init" target="_blank">GitHub</a>
            <a href="https://www.npmjs.com/package/@keshavsoft/kschema-cli" target="_blank">NPM</a>
        </div>

        <footer>
            Built by KeshavSoft
        </footer>

    </div>

    <script>
        function copy(btn) {
            const text = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(text);
            btn.innerText = "Copied";
            setTimeout(() => btn.innerText = "Copy", 1000);
        }
    </script>

</body>

</html>
