<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kschema CLI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 10px;
        }

        .tagline {
            color: #8b949e;
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        code {
            display: block;
            background: #161b22;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            color: #79c0ff;
        }

        a {
            color: #58a6ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>kschema CLI</h1>
    <div class="tagline">CLI to generate projects using templates</div>

    <div class="section">
        <h2>Install</h2>
        <code>npm i -g @keshavsoft/kschema-cli</code>
    </div>

    <div class="section">
        <h2>Usage</h2>
        <code>kschema init basic MyApp</code>
        <code>kschema init express MyServer</code>
    </div>

    <div class="section">
        <h2>Quick Start</h2>
        <code>npx @keshavsoft/kschema-cli init express MyApp</code>
    </div>

    <div class="section">
        <h2>Links</h2>
        <p>
            <a href="https://github.com/keshavsoft/kschema-init" target="_blank">GitHub</a><br />
            <a href="https://www.npmjs.com/package/@keshavsoft/kschema-cli" target="_blank">NPM</a>
        </p>
    </div>

</body>

</html>
